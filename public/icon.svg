<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="192" height="192" rx="44" fill="#0D0D0D"/>
  
  <!-- Yellow accent circle -->
  <circle cx="96" cy="96" r="88" stroke="#FDD835" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Code brackets with DSA concept -->
  <g transform="translate(96, 96)">
    <!-- Left bracket -->
    <path d="M -40 -30 L -50 -20 L -40 10 L -50 20" stroke="#FDD835" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 40 -30 L 50 -20 L 40 10 L 50 20" stroke="#FDD835" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center elements: DSA concept -->
    <circle cx="0" cy="-8" r="5" fill="#FDD835"/>
    <circle cx="-12" cy="8" r="5" fill="#FDD835"/>
    <circle cx="12" cy="8" r="5" fill="#FDD835"/>
    <!-- connecting lines -->
    <line x1="0" y1="-3" x2="-12" y2="3" stroke="#FDD835" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="12" y2="3" stroke="#FDD835" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>
  
  <!-- Border -->
  <rect x="16" y="16" width="160" height="160" rx="36" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.15"/>
</svg>